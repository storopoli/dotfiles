# vim:fileencoding=utf-8:foldmethod=marker

enable_audio_bell false
allow_remote_control true

# vim-slime
listen_on unix:/tmp/mykitty

font_family Hack Nerd Font
italic_font auto
bold_italic_font auto
mouse_hide_wait 2
cursor_shape block
url_color #0087bd
url_style dotted
background_opacity 0.95

# gruvbox theme
# https://github.com/gruvbox-community/gruvbox-contrib
selection_foreground    #ebdbb2
selection_background    #d65d0e

background              #1d2021
foreground              #ebdbb2

color0                  #3c3836
color1                  #cc241d
color2                  #98971a
color3                  #d79921
color4                  #458588
color5                  #b16286
color6                  #689d6a
color7                  #a89984
color8                  #928374
color9                  #fb4934
color10                 #b8bb26
color11                 #fabd2f
color12                 #83a598
color13                 #d3869b
color14                 #8ec07c
color15                 #fbf1c7

cursor                  #bdae93
cursor_text_color       #665c54

url_color               #458588
